<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사무실 관리비 비교</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', sans-serif;
      background: #F7F8FA;
      color: #191F28;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      background: #191F28;
      color: white;
      padding: 24px 40px;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      font-size: 0.8rem;
      color: #8B95A1;
      margin-top: 4px;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── MODE TABS ── */
    .mode-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      background: #EAECEF;
      border-radius: 12px;
      padding: 4px;
      width: fit-content;
    }

    .mode-tab {
      padding: 8px 22px;
      border-radius: 9px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      color: #8B95A1;
      transition: all 0.15s;
    }

    .mode-tab.active {
      background: #FFFFFF;
      color: #191F28;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    .mode-tab:hover:not(.active) { color: #4E5968; }

    /* ── BRANCH PANEL ── */
    .branch-panel {
      background: white;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #E5E8EB;
      margin-bottom: 20px;
    }

    .branch-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .branch-panel-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #8B95A1;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .branch-actions { display: flex; gap: 8px; }

    .branch-action-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #E5E8EB;
      background: white;
      cursor: pointer;
      font-size: 0.75rem;
      color: #4E5968;
      transition: all 0.15s;
    }

    .branch-action-btn:hover { border-color: #3182F6; color: #3182F6; }

    /* Branch groups */
    .branch-groups { display: flex; flex-direction: column; gap: 12px; }

    .branch-group-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #B0B8C1;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .branch-chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .branch-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px 7px 10px;
      border-radius: 24px;
      border: 1.5px solid #E5E8EB;
      background: #FFFFFF;
      cursor: pointer;
      font-size: 0.84rem;
      font-weight: 600;
      color: #4E5968;
      transition: all 0.15s;
      user-select: none;
    }

    .branch-chip-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .branch-chip.selected {
      background: color-mix(in srgb, var(--chip-color) 14%, white);
      border-color: var(--chip-color);
      color: #191F28;
    }

    .branch-chip-note {
      font-size: 0.7rem;
      font-weight: 400;
      color: #B0B8C1;
      margin-left: 1px;
    }

    .branch-chip-badge {
      font-size: 0.63rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      background: #F2F4F6;
      color: #8B95A1;
      margin-left: 2px;
    }

    .branch-chip.selected .branch-chip-badge {
      background: color-mix(in srgb, var(--chip-color) 25%, white);
      color: color-mix(in srgb, var(--chip-color) 80%, #333);
    }

    /* single mode: inactive dimmed */
    .branch-chip.single-mode-inactive {
      opacity: 0.4;
    }

    /* ── ITEM SELECTOR ── */
    .item-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .item-btn {
      padding: 7px 20px;
      border-radius: 24px;
      border: 1.5px solid #E5E8EB;
      background: white;
      cursor: pointer;
      font-size: 0.84rem;
      font-weight: 600;
      color: #4E5968;
      transition: all 0.15s;
    }

    .item-btn.active {
      color: white;
      border-color: transparent;
    }

    /* ── SUMMARY CARDS ── */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    @media (max-width: 900px) { .summary-cards { grid-template-columns: repeat(2, 1fr); } }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px 20px;
      border: 1px solid #E5E8EB;
    }

    .card .label { font-size: 0.74rem; color: #8B95A1; margin-bottom: 6px; font-weight: 500; }
    .card .value { font-size: 1.25rem; font-weight: 700; color: #191F28; letter-spacing: -0.5px; }
    .card .sub   { font-size: 0.73rem; color: #B0B8C1; margin-top: 4px; }

    .card-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .card-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .card-dot-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: #8B95A1;
    }

    /* ── SECTIONS ── */
    .section {
      background: white;
      border-radius: 16px;
      padding: 22px 24px;
      border: 1px solid #E5E8EB;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #191F28;
      margin-bottom: 18px;
      letter-spacing: -0.2px;
    }

    .chart-container { position: relative; height: 320px; }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }

    thead th {
      background: #F7F8FA;
      padding: 10px 14px;
      text-align: right;
      font-weight: 600;
      color: #8B95A1;
      border-bottom: 1px solid #E5E8EB;
      white-space: nowrap;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    thead th:first-child { text-align: left; }

    tbody tr { border-bottom: 1px solid #F2F4F6; transition: background 0.1s; }
    tbody tr:hover { background: #F7F8FA; }
    tbody tr.latest { background: #FAFBFF; }

    tbody td {
      padding: 10px 14px;
      text-align: right;
      color: #4E5968;
      white-space: nowrap;
    }

    tbody td:first-child { text-align: left; font-weight: 600; color: #191F28; }

    .num { font-variant-numeric: tabular-nums; }

    .pct-bar {
      display: flex;
      height: 4px;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 10px;
      gap: 2px;
    }

    .pct-bar-seg { height: 100%; border-radius: 2px; }

    tfoot td {
      padding: 11px 14px;
      text-align: right;
      font-weight: 700;
      background: #F7F8FA;
      border-top: 1px solid #E5E8EB;
      color: #191F28;
      font-size: 0.84rem;
    }

    tfoot td:first-child { text-align: left; }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: #8B95A1;
      font-weight: 500;
    }

    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

    /* ── ITEM COMPARE TABLE ── */
    .compare-table-wrap { overflow-x: auto; }

    /* ── ANOMALY ANALYSIS ── */
    .anomaly-intro {
      background: #fff;
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
      border: 1px solid #E5E8EB;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .anomaly-intro-icon { font-size: 1.8rem; }
    .anomaly-intro-text h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
    .anomaly-intro-text p { font-size: 0.8rem; color: #8B95A1; line-height: 1.5; }

    .anomaly-branch-group {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #E5E8EB;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .anomaly-branch-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid #F2F4F6;
      background: #FAFBFC;
    }
    .anomaly-branch-dot {
      width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0;
    }
    .anomaly-branch-name { font-size: 0.95rem; font-weight: 700; color: #191F28; }
    .anomaly-branch-note { font-size: 0.78rem; color: #8B95A1; margin-left: 2px; }
    .anomaly-branch-badge {
      margin-left: auto;
      background: #FFF3CD;
      color: #92400E;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .anomaly-card {
      padding: 20px;
      border-bottom: 1px solid #F2F4F6;
    }
    .anomaly-card:last-child { border-bottom: none; }

    .anomaly-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .anomaly-badge {
      font-size: 0.72rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }
    .anomaly-badge.high { background: #FEE2E2; color: #DC2626; }
    .anomaly-badge.low  { background: #DBEAFE; color: #1D4ED8; }
    .anomaly-month { font-size: 0.88rem; font-weight: 700; color: #191F28; }
    .anomaly-field { font-size: 0.82rem; color: #8B95A1; }
    .anomaly-value { font-size: 0.88rem; font-weight: 700; }
    .anomaly-vs    { font-size: 0.78rem; color: #8B95A1; margin-left: 4px; }

    .anomaly-body { display: grid; grid-template-columns: 220px 1fr; gap: 16px; }
    @media(max-width: 700px) { .anomaly-body { grid-template-columns: 1fr; } }

    .anomaly-chart-wrap {
      height: 120px;
      position: relative;
    }

    .anomaly-panels { display: flex; flex-direction: column; gap: 10px; }

    .question-box {
      background: #FFFBEB;
      border: 1px solid #FDE68A;
      border-radius: 10px;
      padding: 12px 14px;
      position: relative;
    }
    .question-box-label {
      font-size: 0.72rem; font-weight: 700; color: #92400E;
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 5px;
    }
    .question-text {
      font-size: 0.78rem; color: #3D2B04; line-height: 1.65;
      white-space: pre-line; font-family: inherit;
    }
    .copy-btn {
      position: absolute; top: 10px; right: 10px;
      background: #F59E0B; color: white; border: none;
      font-size: 0.7rem; font-weight: 700; padding: 4px 10px;
      border-radius: 6px; cursor: pointer;
    }
    .copy-btn:active { opacity: 0.7; }
    .copy-btn.copied { background: #10B981; }

    .analysis-box {
      background: #F0FDF4;
      border: 1px solid #86EFAC;
      border-radius: 10px;
      padding: 12px 14px;
    }
    .analysis-box-label {
      font-size: 0.72rem; font-weight: 700; color: #15803D;
      margin-bottom: 6px;
    }
    .analysis-text {
      font-size: 0.78rem; color: #1C3D1F; line-height: 1.65;
      white-space: pre-line;
    }

    .anomaly-empty {
      text-align: center; padding: 60px 20px;
      color: #8B95A1; font-size: 0.88rem;
    }
    .anomaly-empty-icon { font-size: 2.5rem; margin-bottom: 10px; }

    .anomaly-threshold-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px;
      background: #F7F8FA;
      border-bottom: 1px solid #E5E8EB;
      font-size: 0.82rem; color: #4B5563;
    }
    .threshold-label { font-weight: 600; }
    .threshold-slider { flex: 1; max-width: 160px; accent-color: #F59E0B; }
    .threshold-value { font-weight: 700; color: #F59E0B; min-width: 28px; }
  </style>
</head>

<header>
  <h1>사무실 관리비 현황</h1>
  <p>지점별 월별 관리비 비교 대시보드</p>
</header>

<div class="container">

  <!-- Mode tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('single')">단일 지점</button>
    <button class="mode-tab" onclick="setMode('item')">항목 비교</button>
    <button class="mode-tab" onclick="setMode('analyze')">🔍 이상치 분석</button>
  </div>

  <!-- Branch panel -->
  <div class="branch-panel" id="branchPanel">
    <div class="branch-panel-header">
      <span class="branch-panel-label" id="branchPanelLabel">지점 선택</span>
      <div class="branch-actions" id="branchActions" style="display:none">
        <button class="branch-action-btn" onclick="selectAll()">전체 선택</button>
        <button class="branch-action-btn" onclick="deselectAll()">전체 해제</button>
      </div>
    </div>
    <div id="branchGroups"></div>
  </div>

  <!-- Item selector (항목 비교 only) -->
  <div class="item-selector" id="itemSelector" style="display:none">
    <button class="item-btn active" data-item="total"   onclick="setItem(this)">합계</button>
    <button class="item-btn"        data-item="general" onclick="setItem(this)">일반관리비</button>
    <button class="item-btn"        data-item="elec"    onclick="setItem(this)">세대전기료</button>
    <button class="item-btn"        data-item="other"   onclick="setItem(this)">기타항목</button>
  </div>

  <!-- Main content -->
  <div id="mainContent"></div>

</div>

// ============================
//  BRANCH PANEL (grouped)
// ============================
function buildBranchPanel() {
  const container = document.getElementById('branchGroups');
  const actions   = document.getElementById('branchActions');
  const label     = document.getElementById('branchPanelLabel');

  container.innerHTML = '';

  if (currentMode === 'single') {
    label.textContent = '지점 선택';
    actions.style.display = 'none';
  } else {
    label.textContent = '비교할 지점 선택';
    actions.style.display = 'flex';
  }

  const groups = { '상가': [], '객실': [] };
  branchNames.forEach(name => groups[branches[name].type].push(name));

  const groupsEl = document.createElement('div');
  groupsEl.className = 'branch-groups';

  ['상가', '객실'].forEach(type => {
    const groupNames = groups[type];
    if (!groupNames.length) return;

    const groupDiv = document.createElement('div');
    groupDiv.innerHTML = `<div class="branch-group-label">${type}</div>`;
    const chipsRow = document.createElement('div');
    chipsRow.className = 'branch-chips-row';

    groupNames.forEach(name => {
      const color = branchColor[name];
      const branch = branches[name];
      const isSelected = selectedBranches.includes(name);

      const chip = document.createElement('div');
      chip.className = 'branch-chip' + (isSelected ? ' selected' : '');
      if (currentMode === 'single' && !isSelected) chip.classList.add('single-mode-inactive');
      chip.style.setProperty('--chip-color', color);
      chip.innerHTML = `
        <div class="branch-chip-dot" style="background:${color}"></div>
        <span>${name}</span>
        <span class="branch-chip-note">${branch.note}</span>
      `;
      chip.onclick = () => toggleBranch(name);
      chipsRow.appendChild(chip);
    });

    groupDiv.appendChild(chipsRow);
    groupsEl.appendChild(groupDiv);
  });

  container.appendChild(groupsEl);
}

function toggleBranch(name) {
  if (currentMode === 'single') {
    selectedBranches = [name];
  } else {
    if (selectedBranches.includes(name)) {
      if (selectedBranches.length > 1) {
        selectedBranches = selectedBranches.filter(n => n !== name);
      }
    } else {
      selectedBranches.push(name);
    }
  }
  buildBranchPanel();
  renderMain();
}

function selectAll()   { selectedBranches = [...branchNames]; buildBranchPanel(); renderMain(); }
function deselectAll() {
  selectedBranches = [branchNames[0]];
  buildBranchPanel();
  renderMain();
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((btn, i) => {
    btn.classList.toggle('active', ['single','item','analyze'][i] === mode);
  });
  document.getElementById('itemSelector').style.display = mode === 'item' ? 'flex' : 'none';
  document.getElementById('branchPanel').style.display = mode === 'analyze' ? 'none' : '';

  if (mode === 'single') {
    selectedBranches = [selectedBranches[0] || branchNames[0]];
  } else if (mode === 'item' && selectedBranches.length < 2) {
    selectedBranches = [...branchNames];
  }

  if (mode !== 'analyze') buildBranchPanel();
  renderMain();
}

function setItem(btn) {
  document.querySelectorAll('.item-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
    b.style.borderColor = '';
    b.style.color = '';
  });
  btn.classList.add('active');
  const item = btn.dataset.item;
  btn.style.background  = ITEM_BG_COLORS[item];
  btn.style.borderColor = ITEM_BG_COLORS[item];
  btn.style.color       = 'white';
  currentItem = item;
  renderMain();
}

// ============================
//  RENDER DISPATCHER
// ============================
// ============================
//  ANOMALY DETECTION
// ============================
let anomalyThreshold = 1.5;

function detectAnomalies(threshold) {
  const results = [];
  branchNames.forEach(name => {
    const branch = branches[name];
    const rows = branch.data.map(processRow);

    ['elec', 'other', 'general'].forEach(field => {
      const vals = rows.map(r => r[field]);
      if (vals.length < 3) return;
      const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
      const std  = Math.sqrt(vals.reduce((s, v) => s + (v - mean) ** 2, 0) / vals.length);
      if (std < 1000) return; // ignore nearly-flat series

      rows.forEach(row => {
        const val = row[field];
        const z = (val - mean) / std;
        if (Math.abs(z) >= threshold) {
          results.push({ branch: name, note: branch.note, month: row.month, field, value: val, mean, std, z, rows });
        }
      });
    });
  });
  return results.sort((a, b) => Math.abs(b.z) - Math.abs(a.z));
}

function generateQuestion(a) {
  const label = { elec: '세대전기료', other: '기타항목', general: '일반관리비' }[a.field];
  const dir   = a.z > 0 ? '높게' : '낮게';
  const pct   = ((Math.abs(a.value - a.mean) / a.mean) * 100).toFixed(0);
  const ym    = a.month.replace('-', '년 ') + '월';
  const avg   = Math.round(a.mean).toLocaleString();
  const val   = a.value.toLocaleString();

  return `[${a.branch}] ${ym} ${label} 이상 청구 확인 요청

안녕하세요,

${a.note} 관리비 청구 내역 관련하여 문의드립니다.

${ym} ${label} 금액이 ${val}원으로 청구되었으며, 이는 동일 항목 월평균(${avg}원) 대비 약 ${pct}% ${dir} 책정된 수준입니다.

아래 사항을 포함한 상세 내역을 안내해 주시면 감사하겠습니다:

  1. ${label} 세부 항목별 금액 내역
  2. 해당 항목이 평소보다 ${dir === '높게' ? '증가' : '감소'}한 구체적 사유
     (예: 공사비, 장기수선충당금 정산, 보험료 일시납, 검침 오류 등)
  3. 동일 사유가 다음 달에도 발생할 예정인지 여부

감사합니다.`;
}

function generateAnalysis(a) {
  const label  = { elec: '세대전기료', other: '기타항목', general: '일반관리비' }[a.field];
  const mon    = parseInt(a.month.split('-')[1]);
  const pct    = ((Math.abs(a.value - a.mean) / a.mean) * 100).toFixed(0);
  const dir    = a.z > 0 ? '높음' : '낮음';
  const idx    = a.rows.findIndex(r => r.month === a.month);
  const prevRow = idx > 0 ? processRow(a.rows[idx - 1]) : null;
  const nextRow = idx < a.rows.length - 1 ? processRow(a.rows[idx + 1]) : null;

  let lines = [];
  lines.push(`📊 ${label}이 월평균(${Math.round(a.mean).toLocaleString()}원) 대비 ${pct}% ${dir}\n    → 이달 ${a.value.toLocaleString()}원 / 평균 ${Math.round(a.mean).toLocaleString()}원 / 편차 ${a.std > 0 ? (a.z > 0 ? '+' : '') + a.z.toFixed(1) + 'σ' : ''}`);

  if (prevRow) {
    const prev = prevRow[a.field];
    const chg  = a.value - prev;
    const chgP = ((chg / prev) * 100).toFixed(0);
    lines.push(`📈 전월(${a.rows[idx-1].month}) 대비 ${chg >= 0 ? '+' : ''}${chg.toLocaleString()}원 (${chg >= 0 ? '+' : ''}${chgP}%)`);
  }
  if (nextRow) {
    const nxt  = nextRow[a.field];
    const chg  = nxt - a.value;
    lines.push(`➡️ 익월(${a.rows[idx+1].month})에는 ${nxt.toLocaleString()}원으로 ${chg <= 0 ? '정상화' : '추가 상승'}`);
  }

  // Cause hypothesis
  if (a.field === 'elec' && a.z > 0) {
    if (mon >= 6 && mon <= 9)
      lines.push(`☀️ 하계 냉방 성수기(6~9월) — 냉방 kWh 사용량 급증 가능성 높음. 전기 사용량 및 냉방기 가동 내역 확인 필요.`);
    else if (mon >= 12 || mon <= 2)
      lines.push(`❄️ 동계 난방 성수기(12~2월) — 냉난방비 상승 시즌. 히터·냉난방 시스템 가동 내역 확인 필요.`);
    else
      lines.push(`⚡ 비성수기 전기료 이상 급증 — 냉난방 설비 고장, 누전, 특정 장비 장기 가동 여부 확인 필요.`);
  } else if (a.field === 'elec' && a.z < 0) {
    lines.push(`💡 전기료가 평균보다 낮습니다. 절감 요인(공실, 절전 등)이 있는지 확인하세요.`);
  } else if (a.field === 'other' && a.z > 0) {
    if (a.value > a.mean * 3)
      lines.push(`🔧 기타항목이 평균의 ${(a.value / a.mean).toFixed(1)}배 수준 — 대규모 수선공사, 장기수선충당금 일시 정산, 화재보험료 일시납 등 특별 항목 발생 가능성이 매우 높습니다.`);
    else
      lines.push(`📋 기타항목 증가 — 공동설비 유지보수, 엘리베이터 수리, 수도·청소비 변동 등 비정기 비용이 원인일 수 있습니다.`);
  } else if (a.field === 'other' && a.z < 0) {
    lines.push(`📉 기타항목이 낮습니다. 공동비용 정산 지연이나 누락 여부를 확인하세요.`);
  } else if (a.field === 'general' && a.z > 0) {
    lines.push(`🏢 일반관리비 증가 — 관리인력 인건비 인상, 청소·경비 용역비 증액, 또는 관리사무소 운영비 증가 가능성.`);
  } else if (a.field === 'general' && a.z < 0) {
    lines.push(`🏢 일반관리비가 낮습니다. 용역계약 변경이나 관리 항목 조정 여부를 확인하세요.`);
  }

  return lines.join('\n\n');
}

function renderAnalyze(el) {
  const anomalies = detectAnomalies(anomalyThreshold);

  // Group by branch
  const byBranch = {};
  anomalies.forEach(a => {
    if (!byBranch[a.branch]) byBranch[a.branch] = [];
    byBranch[a.branch].push(a);
  });

  const total = anomalies.length;
  const branchCount = Object.keys(byBranch).length;

  el.innerHTML = `
    <div class="anomaly-intro">
      <div class="anomaly-intro-icon">🔍</div>
      <div class="anomaly-intro-text">
        <h3>이상치 자동 분석 — ${branchCount}개 지점, 총 ${total}건 이상 감지</h3>
        <p>월평균 대비 편차가 큰 항목을 자동으로 검출합니다. 각 항목에 관리사무소 문의 문구와 원인 분석이 함께 제공됩니다.</p>
      </div>
    </div>
    <div class="anomaly-threshold-bar">
      <span class="threshold-label">감지 민감도:</span>
      <input type="range" class="threshold-slider" min="1.0" max="2.5" step="0.1" value="${anomalyThreshold}"
        oninput="anomalyThreshold=parseFloat(this.value); document.getElementById('thresholdVal').textContent=this.value+'σ'; renderMain();">
      <span class="threshold-value" id="thresholdVal">${anomalyThreshold}σ</span>
      <span style="color:#8B95A1;font-size:0.75rem">(낮을수록 민감 · 높을수록 엄격)</span>
    </div>
    <div id="anomalyList"></div>
  `;

  const listEl = document.getElementById('anomalyList');

  if (total === 0) {
    listEl.innerHTML = `<div class="anomaly-empty"><div class="anomaly-intro-icon">✅</div><p>현재 기준(${anomalyThreshold}σ)으로는 이상 항목이 없습니다.<br>민감도를 높이면 더 많은 항목이 감지됩니다.</p></div>`;
    return;
  }

  Object.entries(byBranch).forEach(([branchName, items]) => {
    const color = branchColor[branchName];
    const note  = branches[branchName].note;

    const groupEl = document.createElement('div');
    groupEl.className = 'anomaly-branch-group';
    groupEl.innerHTML = `
      <div class="anomaly-branch-header">
        <div class="anomaly-branch-dot" style="background:${color}"></div>
        <span class="anomaly-branch-name">${branchName}</span>
        <span class="anomaly-branch-note">${note}</span>
        <span class="anomaly-branch-badge">⚠ ${items.length}건</span>
      </div>
    `;

    items.forEach((a, ci) => {
      const fieldLabel = { elec: '세대전기료', other: '기타항목', general: '일반관리비' }[a.field];
      const isHigh = a.z > 0;
      const pct    = ((Math.abs(a.value - a.mean) / a.mean) * 100).toFixed(0);
      const question = generateQuestion(a);
      const analysis = generateAnalysis(a);

      const cardEl = document.createElement('div');
      cardEl.className = 'anomaly-card';
      const canvasId = `aChart_${branchName}_${a.month}_${a.field}`.replace(/[^a-zA-Z0-9_]/g, '_');
      cardEl.innerHTML = `
        <div class="anomaly-card-header">
          <span class="anomaly-badge ${isHigh ? 'high' : 'low'}">${isHigh ? '▲ 이상 높음' : '▼ 이상 낮음'}</span>
          <span class="anomaly-month">${a.month}</span>
          <span class="anomaly-field">· ${fieldLabel}</span>
          <span class="anomaly-value" style="margin-left:auto;color:${isHigh ? '#DC2626' : '#1D4ED8'}">${a.value.toLocaleString()}원</span>
          <span class="anomaly-vs">vs 평균 ${Math.round(a.mean).toLocaleString()}원 (${isHigh ? '+' : '-'}${pct}%)</span>
        </div>
        <div class="anomaly-body">
          <div class="anomaly-chart-wrap">
            <canvas id="${canvasId}"></canvas>
          </div>
          <div class="anomaly-panels">
            <div class="question-box">
              <div class="question-box-label">💬 관리사무소 문의 문구 (복사하여 그대로 사용)</div>
              <button class="copy-btn" onclick="copyQuestion(this, '${canvasId}')">복사</button>
              <pre class="question-text" id="qt_${canvasId}">${question}</pre>
            </div>
            <div class="analysis-box">
              <div class="analysis-box-label">🤖 원인 분석</div>
              <div class="analysis-text">${analysis}</div>
            </div>
          </div>
        </div>
      `;
      groupEl.appendChild(cardEl);

      // Draw mini chart after DOM insertion
      setTimeout(() => {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const rows  = a.rows.map(processRow);
        const labels = rows.map(r => r.month.slice(5));
        const data   = rows.map(r => r[a.field]);
        const highlightIdx = rows.findIndex(r => r.month === a.month);
        const ptColors = data.map((_, i) => i === highlightIdx ? (isHigh ? '#DC2626' : '#1D4ED8') : color + '90');
        const ptRadii  = data.map((_, i) => i === highlightIdx ? 6 : 3);

        const miniChart = new Chart(canvas, {
          type: 'line',
          data: {
            labels,
            datasets: [{
              data,
              borderColor: color,
              backgroundColor: 'transparent',
              pointBackgroundColor: ptColors,
              pointRadius: ptRadii,
              tension: 0.3, borderWidth: 2, spanGaps: true
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: ctx => ctx.raw.toLocaleString() + '원' } }
            },
            scales: {
              x: { grid: { display: false }, border: { display: false }, ticks: { font: { size: 9 } } },
              y: { grid: { color: '#F2F4F6' }, border: { display: false },
                   ticks: { callback: v => (v/10000).toFixed(0)+'만', font: { size: 9 } }}
            }
          }
        });
        charts.push(miniChart);
      }, 0);
    });

    listEl.appendChild(groupEl);
  });
}

function copyQuestion(btn, id) {
  const text = document.getElementById('qt_' + id)?.textContent || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
  });
}

function renderMain() {
  destroyCharts();
  const content = document.getElementById('mainContent');
  content.innerHTML = '';

  if (currentMode === 'single') {
    renderSingle(content);
  } else if (currentMode === 'item') {
    renderItem(content);
  } else {
    renderAnalyze(content);
  }
}

// ============================
//  SINGLE BRANCH VIEW
// ============================
function renderSingle(el) {
  const name   = selectedBranches[0];
  const branch = branches[name];
  const rows   = branch.data.map(processRow);
  const last   = rows[rows.length - 1];

  el.innerHTML = `
    <div class="summary-cards">
      <div class="card">
        <div class="card-indicator">
          <div class="card-dot" style="background:#94A3B8"></div>
          <span class="card-dot-label">최근 월 합계</span>
        </div>
        <div class="value num">${fmt(last.total)}</div>
        <div class="sub">${last.month}</div>
      </div>
      <div class="card">
        <div class="card-indicator">
          <div class="card-dot" style="background:#93C5FD"></div>
          <span class="card-dot-label">일반관리비</span>
        </div>
        <div class="value num">${last.general.toLocaleString()}원</div>
        <div class="sub">전체의 ${pct(last.general, last.total)}</div>
      </div>
      <div class="card">
        <div class="card-indicator">
          <div class="card-dot" style="background:#86EFAC"></div>
          <span class="card-dot-label">세대전기료</span>
        </div>
        <div class="value num">${last.elec.toLocaleString()}원</div>
        <div class="sub">전체의 ${pct(last.elec, last.total)}</div>
      </div>
      <div class="card">
        <div class="card-indicator">
          <div class="card-dot" style="background:#FDE68A"></div>
          <span class="card-dot-label">기타항목</span>
        </div>
        <div class="value num">${last.other.toLocaleString()}원</div>
        <div class="sub">전체의 ${pct(last.other, last.total)}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">월별 항목 구성 <span style="font-weight:400;color:${branchColor[name]};font-size:0.85rem;margin-left:6px">● ${name}</span></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#93C5FD"></div>일반관리비</div>
        <div class="legend-item"><div class="legend-dot" style="background:#86EFAC"></div>세대전기료</div>
        <div class="legend-item"><div class="legend-dot" style="background:#FDE68A"></div>기타항목</div>
      </div>
      <div class="chart-container"><canvas id="c_stacked"></canvas></div>
    </div>

    <div class="section">
      <div class="section-title">항목별 추세 <span style="font-weight:400;color:${branchColor[name]};font-size:0.85rem;margin-left:6px">● ${name}</span></div>
      <div class="chart-container" style="height:240px"><canvas id="c_line"></canvas></div>
    </div>

    <div class="section">
      <div class="section-title">월별 상세 내역 <span style="font-weight:400;color:${branchColor[name]};font-size:0.85rem;margin-left:6px">● ${name}</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>월</th><th>합계</th>
            <th>일반관리비</th><th>비율</th>
            <th>세대전기료</th><th>비율</th>
            <th>기타항목</th><th>비율</th>
            <th>구성</th>
          </tr></thead>
          <tbody id="t_body"></tbody>
          <tfoot id="t_foot"></tfoot>
        </table>
      </div>
    </div>
  `;

  const labels = rows.map(r => r.month.replace('20',''));

  // Stacked bar
  charts.push(new Chart(document.getElementById('c_stacked'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '일반관리비', data: rows.map(r => r.general), backgroundColor: '#93C5FD', borderRadius: 0 },
        { label: '세대전기료', data: rows.map(r => r.elec),    backgroundColor: '#86EFAC', borderRadius: 0 },
        { label: '기타항목',   data: rows.map(r => r.other),   backgroundColor: '#FDE68A', borderRadius: [4,4,0,0], borderSkipped: false },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.raw.toLocaleString()}원` }}
      },
      scales: {
        x: { stacked: true, grid: { display: false }, border: { display: false } },
        y: { stacked: true, grid: { color: '#F2F4F6' }, border: { display: false },
             ticks: { callback: v => (v/10000).toFixed(0)+'만' }}
      }
    }
  }));

  // Line
  charts.push(new Chart(document.getElementById('c_line'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '일반관리비', data: rows.map(r => r.general), borderColor: '#93C5FD', backgroundColor: '#93C5FD20', fill: true,  tension: 0.35, pointRadius: 3, borderWidth: 2 },
        { label: '세대전기료', data: rows.map(r => r.elec),    borderColor: '#86EFAC', backgroundColor: '#86EFAC18', fill: true,  tension: 0.35, pointRadius: 3, borderWidth: 2 },
        { label: '기타항목',   data: rows.map(r => r.other),   borderColor: '#FDE68A', backgroundColor: '#FDE68A18', fill: true,  tension: 0.35, pointRadius: 3, borderWidth: 2 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 }, padding: 14, usePointStyle: true, pointStyleWidth: 8 }},
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.raw.toLocaleString()}원` }}
      },
      scales: {
        x: { grid: { display: false }, border: { display: false } },
        y: { grid: { color: '#F2F4F6' }, border: { display: false },
             ticks: { callback: v => (v/10000).toFixed(0)+'만' }}
      }
    }
  }));

  // Table
  const tbody = document.getElementById('t_body');
  const tfoot = document.getElementById('t_foot');
  let st = 0, sg = 0, se = 0, so = 0;

  rows.forEach((r, i) => {
    st += r.total; sg += r.general; se += r.elec; so += r.other;
    const gP = ((r.general/r.total)*100).toFixed(1);
    const eP = ((r.elec/r.total)*100).toFixed(1);
    const oP = ((r.other/r.total)*100).toFixed(1);
    const tr = document.createElement('tr');
    if (i === rows.length - 1) tr.className = 'latest';
    tr.innerHTML = `
      <td>${r.month}</td>
      <td class="num">${r.total.toLocaleString()}</td>
      <td class="num" style="color:#3B82F6">${r.general.toLocaleString()}</td>
      <td style="color:#B0B8C1;font-size:0.78rem">${gP}%</td>
      <td class="num" style="color:#10B981">${r.elec.toLocaleString()}</td>
      <td style="color:#B0B8C1;font-size:0.78rem">${eP}%</td>
      <td class="num" style="color:#F59E0B">${r.other.toLocaleString()}</td>
      <td style="color:#B0B8C1;font-size:0.78rem">${oP}%</td>

          <div class="pct-bar-seg" style="width:${gP}%;background:#93C5FD"></div>
          <div class="pct-bar-seg" style="width:${eP}%;background:#86EFAC"></div>
          <div class="pct-bar-seg" style="width:${oP}%;background:#FDE68A"></div>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });

  tfoot.innerHTML = `<tr>
    <td>합계 (${rows.length}개월)</td>
    <td class="num">${st.toLocaleString()}</td>
    <td class="num" style="color:#3B82F6">${sg.toLocaleString()}</td>
    <td style="color:#B0B8C1;font-size:0.78rem">${((sg/st)*100).toFixed(1)}%</td>
    <td class="num" style="color:#10B981">${se.toLocaleString()}</td>
    <td style="color:#B0B8C1;font-size:0.78rem">${((se/st)*100).toFixed(1)}%</td>
    <td class="num" style="color:#F59E0B">${so.toLocaleString()}</td>
    <td style="color:#B0B8C1;font-size:0.78rem">${((so/st)*100).toFixed(1)}%</td>
    <td></td>
  </tr>`;
}

// ============================
//  ITEM VIEW (항목 비교)
// ============================
function renderItem(el) {
  const allMonths   = getAllMonths();
  const selBranches = selectedBranches.filter(n => branches[n]);
  const labels      = allMonths.map(m => m.replace('20',''));
  const item        = currentItem;
  const itemLabel   = ITEM_LABELS[item];

  const rowMaps = {};
  selBranches.forEach(name => {
    rowMaps[name] = Object.fromEntries(branches[name].data.map(processRow).map(r => [r.month, r]));
  });

  el.innerHTML = `
    <div class="section">
      <div class="section-title">${itemLabel} 월별 추이 비교</div>
      <div class="chart-container" style="height:300px"><canvas id="c_item_line"></canvas></div>
    </div>

    <div class="section">
      <div class="section-title">${itemLabel} 월별 비교표</div>
      <div class="compare-table-wrap">
        <table id="item_table"></table>
      </div>
    </div>
  `;

  // Line chart
  charts.push(new Chart(document.getElementById('c_item_line'), {
    type: 'line',
    data: {
      labels,
      datasets: selBranches.map(name => ({
        label: name,
        data: allMonths.map(m => rowMaps[name][m]?.[item] ?? null),
        borderColor: branchColor[name],
        backgroundColor: branchColor[name] + '20',
        fill: false, tension: 0.35, pointRadius: 3, borderWidth: 2, spanGaps: false
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 }, padding: 14, usePointStyle: true, pointStyleWidth: 8 }},
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.raw?.toLocaleString()}원` }}
      },
      scales: {
        x: { grid: { display: false }, border: { display: false } },
        y: { grid: { color: '#F2F4F6' }, border: { display: false },
             ticks: { callback: v => (v/10000).toFixed(0)+'만' }}
      }
    }
  }));

  // Table
  const table = document.getElementById('item_table');
  const thCells = selBranches.map(n => `<th style="color:${branchDarkColor[n]};font-weight:700">${n}</th>`).join('');
  const cumSums = {};
  selBranches.forEach(n => { cumSums[n] = 0; });

  const tRows = allMonths.map(m => {
    selBranches.forEach(n => { if (rowMaps[n][m]) cumSums[n] += rowMaps[n][m][item] || 0; });
    return `<tr><td>${m}</td>${selBranches.map(n => {
      const r = rowMaps[n][m];
      return `<td class="num" style="color:${branchDarkColor[n]}">${r ? (r[item]||0).toLocaleString() : '-'}</td>`;
    }).join('')}</tr>`;
  }).join('');

  const tfCells = selBranches.map(n =>
    `<td class="num" style="color:${branchDarkColor[n]};font-weight:700">${cumSums[n].toLocaleString()}</td>`
  ).join('');

  table.innerHTML = `
    <thead><tr><th>월</th>${thCells}</tr></thead>
    <tbody>${tRows}</tbody>
    <tfoot><tr><td>합계</td>${tfCells}</tr></tfoot>
  `;
}

buildBranchPanel();
renderMain();
