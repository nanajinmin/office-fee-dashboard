<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사무실 관리비 비교</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', sans-serif;
      background: #F7F8FA;
      color: #191F28;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      background: #191F28;
      color: white;
      padding: 24px 40px;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      font-size: 0.8rem;
      color: #8B95A1;
      margin-top: 4px;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── MODE TABS ── */
    .mode-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      background: #EAECEF;
      border-radius: 12px;
      padding: 4px;
      width: fit-content;
    }

    .mode-tab {
      padding: 8px 22px;
      border-radius: 9px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      color: #8B95A1;
      transition: all 0.15s;
    }

    .mode-tab.active {
      background: #FFFFFF;
      color: #191F28;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    .mode-tab:hover:not(.active) { color: #4E5968; }

    /* ── BRANCH PANEL ── */
    .branch-panel {
      background: white;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #E5E8EB;
      margin-bottom: 20px;
    }

    .branch-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .branch-panel-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #8B95A1;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .branch-actions { display: flex; gap: 8px; }

    .branch-action-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #E5E8EB;
      background: white;
      cursor: pointer;
      font-size: 0.75rem;
      color: #4E5968;
      transition: all 0.15s;
    }

    .branch-action-btn:hover { border-color: #3182F6; color: #3182F6; }

    /* Branch groups */
    .branch-groups { display: flex; flex-direction: column; gap: 12px; }

    .branch-group-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #B0B8C1;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .branch-chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .branch-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px 7px 10px;
      border-radius: 24px;
      border: 1.5px solid #E5E8EB;
      background: #FFFFFF;
      cursor: pointer;
      font-size: 0.84rem;
      font-weight: 600;
      color: #4E5968;
      transition: all 0.15s;
      user-select: none;
    }

    .branch-chip-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .branch-chip.selected {
      background: color-mix(in srgb, var(--chip-color) 14%, white);
      border-color: var(--chip-color);
      color: #191F28;
    }

    .branch-chip-note {
      font-size: 0.7rem;
      font-weight: 400;
      color: #B0B8C1;
      margin-left: 1px;
    }

    .branch-chip-badge {
      font-size: 0.63rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      background: #F2F4F6;
      color: #8B95A1;
      margin-left: 2px;
    }

    .branch-chip.selected .branch-chip-badge {
      background: color-mix(in srgb, var(--chip-color) 25%, white);
      color: color-mix(in srgb, var(--chip-color) 80%, #333);
    }

    /* single mode: inactive dimmed */
    .branch-chip.single-mode-inactive {
      opacity: 0.4;
    }

    /* ── ITEM SELECTOR ── */
    .item-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .item-btn {
      padding: 7px 20px;
      border-radius: 24px;
      border: 1.5px solid #E5E8EB;
      background: white;
      cursor: pointer;
      font-size: 0.84rem;
      font-weight: 600;
      color: #4E5968;
      transition: all 0.15s;
    }

    .item-btn.active {
      color: white;
      border-color: transparent;
    }

    /* ── SUMMARY CARDS ── */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    @media (max-width: 900px) { .summary-cards { grid-template-columns: repeat(2, 1fr); } }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px 20px;
      border: 1px solid #E5E8EB;
    }

    .card .label { font-size: 0.74rem; color: #8B95A1; margin-bottom: 6px; font-weight: 500; }
    .card .value { font-size: 1.25rem; font-weight: 700; color: #191F28; letter-spacing: -0.5px; }
    .card .sub   { font-size: 0.73rem; color: #B0B8C1; margin-top: 4px; }

    .card-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .card-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .card-dot-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: #8B95A1;
    }

    /* ── SECTIONS ── */
    .section {
      background: white;
      border-radius: 16px;
      padding: 22px 24px;
      border: 1px solid #E5E8EB;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #191F28;
      margin-bottom: 18px;
      letter-spacing: -0.2px;
    }

    .chart-container { position: relative; height: 320px; }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }

    thead th {
      background: #F7F8FA;
      padding: 10px 14px;
      text-align: right;
      font-weight: 600;
      color: #8B95A1;
      border-bottom: 1px solid #E5E8EB;
      white-space: nowrap;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    thead th:first-child { text-align: left; }

    tbody tr { border-bottom: 1px solid #F2F4F6; transition: background 0.1s; }
    tbody tr:hover { background: #F7F8FA; }
    tbody tr.latest { background: #FAFBFF; }

    tbody td {
      padding: 10px 14px;
      text-align: right;
      color: #4E5968;
      white-space: nowrap;
    }

    tbody td:first-child { text-align: left; font-weight: 600; color: #191F28; }

    .num { font-variant-numeric: tabular-nums; }

    .pct-bar {
      display: flex;
      height: 4px;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 10px;
      gap: 2px;
    }

    .pct-bar-seg { height: 100%; border-radius: 2px; }

    tfoot td {
      padding: 11px 14px;
      text-align: right;
      font-weight: 700;
      background: #F7F8FA;
      border-top: 1px solid #E5E8EB;
      color: #191F28;
      font-size: 0.84rem;
    }

    tfoot td:first-child { text-align: left; }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: #8B95A1;
      font-weight: 500;
    }

    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

    /* ── ITEM COMPARE TABLE ── */
    .compare-table-wrap { overflow-x: auto; }

    /* ── HEATMAP TABLE ── */
    .hm-table-wrap { overflow-x: auto; }
    .hm-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .hm-table thead th {
      padding: 8px 14px; text-align: right;
      color: #8B95A1; font-weight: 600; font-size: 0.75rem;
      border-bottom: 1px solid #E5E8EB; background: #FAFBFC;
    }
    .hm-th-month { text-align: left !important; min-width: 80px; }
    .hm-table tbody td { padding: 6px 14px; text-align: right; border-bottom: 1px solid #F2F4F6; color: #374151; }
    .hm-month { text-align: left !important; font-weight: 500; color: #8B95A1; font-size: 0.78rem; }
    .hm-high { background: rgba(220,38,38,0.09); color: #DC2626; font-weight: 700; cursor: pointer; }
    .hm-low  { background: rgba(29,78,216,0.09); color: #1D4ED8; font-weight: 700; cursor: pointer; }
    .hm-high:hover { background: rgba(220,38,38,0.2); }
    .hm-low:hover  { background: rgba(29,78,216,0.2); }
    .hm-pct { font-size: 0.7rem; margin-left: 3px; opacity: 0.85; }

    /* ── BRANCH QUESTION ── */
    .branch-question-area { border-top: 1px solid #E5E8EB; }
    .branch-copy-btn {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 12px 20px; background: #FFFBEB;
      border: none; border-bottom: 1px solid #FDE68A;
      font-size: 0.82rem; font-weight: 600; color: #92400E;
      cursor: pointer; text-align: left; transition: background 0.15s;
    }
    .branch-copy-btn:hover { background: #FEF3C7; }
    .branch-copy-btn.copied { background: #D1FAE5; color: #065F46; border-color: #6EE7B7; }
    .branch-question-hidden { position: absolute; opacity: 0; pointer-events: none; height: 0; }

    /* ── DETAIL PANEL ── */
    .anomaly-detail-area { border-top: 2px solid #FDE68A; background: #FEFCE8; }
    .anomaly-detail-area:empty { display: none; border: none; background: none; }
    .detail-header {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 12px 20px; border-bottom: 1px solid #FDE68A;
    }
    .detail-body { display: flex; gap: 16px; padding: 16px 20px; }
    @media(max-width:650px) { .detail-body { flex-direction: column; } }
    .detail-chart-wrap { width: 220px; height: 120px; flex-shrink: 0; }

    /* ── σ HELP ── */
    .sigma-help {
      font-size: 0.72rem; color: #8B95A1; cursor: help;
      text-decoration: underline dotted; white-space: nowrap;
    }

    /* ── ANOMALY ANALYSIS ── */
    .anomaly-intro {
      background: #fff;
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
      border: 1px solid #E5E8EB;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .anomaly-intro-icon { font-size: 1.8rem; }
    .anomaly-intro-text h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
    .anomaly-intro-text p { font-size: 0.8rem; color: #8B95A1; line-height: 1.5; }

    .anomaly-branch-group {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #E5E8EB;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .anomaly-branch-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid #F2F4F6;
      background: #FAFBFC;
    }
    .anomaly-branch-dot {
      width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0;
    }
    .anomaly-branch-name { font-size: 0.95rem; font-weight: 700; color: #191F28; }
    .anomaly-branch-note { font-size: 0.78rem; color: #8B95A1; margin-left: 2px; }
    .anomaly-branch-badge {
      margin-left: auto;
      background: #FFF3CD;
      color: #92400E;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .anomaly-card {
      padding: 20px;
      border-bottom: 1px solid #F2F4F6;
    }
    .anomaly-card:last-child { border-bottom: none; }

    .anomaly-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .anomaly-badge {
      font-size: 0.72rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }
    .anomaly-badge.high { background: #FEE2E2; color: #DC2626; }
    .anomaly-badge.low  { background: #DBEAFE; color: #1D4ED8; }
    .anomaly-month { font-size: 0.88rem; font-weight: 700; color: #191F28; }
    .anomaly-field { font-size: 0.82rem; color: #8B95A1; }
    .anomaly-value { font-size: 0.88rem; font-weight: 700; }
    .anomaly-vs    { font-size: 0.78rem; color: #8B95A1; margin-left: 4px; }

    .anomaly-body { display: grid; grid-template-columns: 220px 1fr; gap: 16px; }
    @media(max-width: 700px) { .anomaly-body { grid-template-columns: 1fr; } }

    .anomaly-chart-wrap {
      height: 120px;
      position: relative;
    }

    .anomaly-panels { display: flex; flex-direction: column; gap: 10px; }

    .question-box {
      background: #FFFBEB;
      border: 1px solid #FDE68A;
      border-radius: 10px;
      padding: 12px 14px;
      position: relative;
    }
    .question-box-label {
      font-size: 0.72rem; font-weight: 700; color: #92400E;
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 5px;
    }
    .question-text {
      font-size: 0.78rem; color: #3D2B04; line-height: 1.65;
      white-space: pre-line; font-family: inherit;
    }
    .copy-btn {
      position: absolute; top: 10px; right: 10px;
      background: #F59E0B; color: white; border: none;
      font-size: 0.7rem; font-weight: 700; padding: 4px 10px;
      border-radius: 6px; cursor: pointer;
    }
    .copy-btn:active { opacity: 0.7; }
    .copy-btn.copied { background: #10B981; }

    .analysis-box {
      background: #F0FDF4;
      border: 1px solid #86EFAC;
      border-radius: 10px;
      padding: 12px 14px;
    }
    .analysis-box-label {
      font-size: 0.72rem; font-weight: 700; color: #15803D;
      margin-bottom: 6px;
    }
    .analysis-text {
      font-size: 0.78rem; color: #1C3D1F; line-height: 1.65;
      white-space: pre-line;
    }

    .anomaly-empty {
      text-align: center; padding: 60px 20px;
      color: #8B95A1; font-size: 0.88rem;
    }
    .anomaly-empty-icon { font-size: 2.5rem; margin-bottom: 10px; }

    .anomaly-threshold-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px;
      background: #F7F8FA;
      border-bottom: 1px solid #E5E8EB;
      font-size: 0.82rem; color: #4B5563;
    }
    .threshold-label { font-weight: 600; }
    .threshold-slider { flex: 1; max-width: 160px; accent-color: #F59E0B; }
    .threshold-value { font-weight: 700; color: #F59E0B; min-width: 28px; }
  </style>
</head>

<header>
  <h1>사무실 관리비 현황</h1>
  <p>지점별 월별 관리비 비교 대시보드</p>
</header>

  <div class="mode-tabs">

    <button class="mode-tab" onclick="setMode('analyze')">🔍 이상치 분석</button>
  </div>

  <!-- Branch panel -->
  <div class="branch-panel" id="branchPanel">
    <div class="branch-panel-header">
      <span class="branch-panel-label" id="branchPanelLabel">지점 선택</span>
      <div class="branch-actions" id="branchActions" style="display:none">
        <button class="branch-action-btn" onclick="selectAll()">전체 선택</button>
        <button class="branch-action-btn" onclick="deselectAll()">전체 해제</button>
      </div>
    </div>
    <div id="branchGroups"></div>
  </div>

  <!-- Item selector (항목 비교 only) -->
  <div class="item-selector" id="itemSelector" style="display:none">
    <button class="item-btn active" data-item="total"   onclick="setItem(this)">합계</button>
    <button class="item-btn"        data-item="general" onclick="setItem(this)">일반관리비</button>
    <button class="item-btn"        data-item="elec"    onclick="setItem(this)">세대전기료</button>
    <button class="item-btn"        data-item="other"   onclick="setItem(this)">기타항목</button>
  </div>

  <!-- Main content -->
  <div id="mainContent"></div>

</div>

function pct(a, b) { return b ? ((a / b) * 100).toFixed(1) + '%' : '-'; }

// ============================
//  BRANCH PANEL (grouped)
// ============================
function buildBranchPanel() {
  const container = document.getElementById('branchGroups');
  const actions   = document.getElementById('branchActions');
  const label     = document.getElementById('branchPanelLabel');

  container.innerHTML = '';

  if (currentMode === 'single') {
    label.textContent = '지점 선택';
    actions.style.display = 'none';
  } else {
    label.textContent = '비교할 지점 선택';
    actions.style.display = 'flex';
  }

  const groups = { '상가': [], '객실': [] };
  branchNames.forEach(name => groups[branches[name].type].push(name));

  const groupsEl = document.createElement('div');
  groupsEl.className = 'branch-groups';

  ['상가', '객실'].forEach(type => {
    const groupNames = groups[type];
    if (!groupNames.length) return;

    const groupDiv = document.createElement('div');
    groupDiv.innerHTML = `<div class="branch-group-label">${type}</div>`;
    const chipsRow = document.createElement('div');
    chipsRow.className = 'branch-chips-row';

    groupNames.forEach(name => {
      const color = branchColor[name];
      const branch = branches[name];
      const isSelected = selectedBranches.includes(name);

      const chip = document.createElement('div');
      chip.className = 'branch-chip' + (isSelected ? ' selected' : '');
      if (currentMode === 'single' && !isSelected) chip.classList.add('single-mode-inactive');
      chip.style.setProperty('--chip-color', color);
      chip.innerHTML = `
        <div class="branch-chip-dot" style="background:${color}"></div>
        <span>${name}</span>
        <span class="branch-chip-note">${branch.note}</span>
      `;
      chip.onclick = () => toggleBranch(name);
      chipsRow.appendChild(chip);
    });

    groupDiv.appendChild(chipsRow);
    groupsEl.appendChild(groupDiv);
  });

  container.appendChild(groupsEl);
}

function toggleBranch(name) {
  if (currentMode === 'single') {
    selectedBranches = [name];
  } else {
    if (selectedBranches.includes(name)) {
      if (selectedBranches.length > 1) {
        selectedBranches = selectedBranches.filter(n => n !== name);
      }
    } else {
      selectedBranches.push(name);
    }
  }
  buildBranchPanel();
  renderMain();
}

function selectAll()   { selectedBranches = [...branchNames]; buildBranchPanel(); renderMain(); }
function deselectAll() {
  selectedBranches = [branchNames[0]];
  buildBranchPanel();
  renderMain();
}

// ============================
//  MODE
// ============================
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((btn, i) => {
    btn.classList.toggle('active', ['single','item','analyze'][i] === mode);
  });
  document.getElementById('itemSelector').style.display = mode === 'item' ? 'flex' : 'none';
  document.getElementById('branchPanel').style.display = mode === 'analyze' ? 'none' : '';

  if (mode === 'single') {
    selectedBranches = [selectedBranches[0] || branchNames[0]];
  } else if (mode === 'item' && selectedBranches.length < 2) {
    selectedBranches = [...branchNames];
  }

  if (mode !== 'analyze') buildBranchPanel();
  renderMain();
}

function setItem(btn) {
  document.querySelectorAll('.item-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
    b.style.borderColor = '';
    b.style.color = '';
  });
  btn.classList.add('active');
  const item = btn.dataset.item;
  btn.style.background  = ITEM_BG_COLORS[item];
  btn.style.borderColor = ITEM_BG_COLORS[item];
  btn.style.color       = 'white';
  currentItem = item;
  renderMain();
}

function detectAnomalies(threshold) {
  const results = [];
  branchNames.forEach(name => {
    const branch = branches[name];
    const rows = branch.data.map(processRow);
    ['elec', 'other', 'general'].forEach(field => {
      const vals = rows.map(r => r[field]);
      if (vals.length < 3) return;
      const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
      const std  = Math.sqrt(vals.reduce((s, v) => s + (v - mean) ** 2, 0) / vals.length);
      if (std < 1000) return;
      rows.forEach(row => {
        const z = (row[field] - mean) / std;
        if (Math.abs(z) >= threshold) {
          results.push({ branch: name, note: branch.note, month: row.month, field, value: row[field], mean, std, z, rows });
        }
      });
    });
  });
  return results;
}

function generateAnalysis(a) {
  const label   = { elec: '세대전기료', other: '기타항목', general: '일반관리비' }[a.field];
  const mon     = parseInt(a.month.split('-')[1]);
  const pct     = ((Math.abs(a.value - a.mean) / a.mean) * 100).toFixed(0);
  const dir     = a.z > 0 ? '높음' : '낮음';
  const idx     = a.rows.findIndex(r => r.month === a.month);
  const prevRow = idx > 0 ? processRow(a.rows[idx - 1]) : null;
  const nextRow = idx < a.rows.length - 1 ? processRow(a.rows[idx + 1]) : null;

  let lines = [];
  lines.push(`📊 ${label}이 월평균(${Math.round(a.mean).toLocaleString()}원) 대비 ${pct}% ${dir}\n    → 이달 ${a.value.toLocaleString()}원 / 평균 ${Math.round(a.mean).toLocaleString()}원 (${a.z > 0 ? '+' : ''}${a.z.toFixed(1)}σ)`);
  if (prevRow) {
    const chg = a.value - prevRow[a.field];
    lines.push(`📈 전월(${a.rows[idx-1].month}) 대비 ${chg >= 0 ? '+' : ''}${chg.toLocaleString()}원 (${chg >= 0 ? '+' : ''}${((chg/prevRow[a.field])*100).toFixed(0)}%)`);
  }
  if (nextRow) {
    const nxt = nextRow[a.field];
    lines.push(`➡️ 익월(${a.rows[idx+1].month})에는 ${nxt.toLocaleString()}원으로 ${nxt < a.value ? '감소 (완화)' : '추가 상승'}`);
  }
  if (a.field === 'elec' && a.z > 0) {
    if (mon >= 6 && mon <= 9) lines.push(`☀️ 하계 냉방 성수기(6~9월) — kWh 사용량 급증 가능성 높음. 냉방기 가동 내역 확인 권장.`);
    else if (mon >= 12 || mon <= 2) lines.push(`❄️ 동계 난방 성수기(12~2월) — 냉난방비 상승 시즌. 히터·냉난방 가동 내역 확인 권장.`);
    else lines.push(`⚡ 비성수기 전기료 급증 — 설비 고장, 누전, 특정 장비 장기 가동 여부 확인 필요.`);
  } else if (a.field === 'elec' && a.z < 0) {
    lines.push(`💡 전기료가 평균보다 낮습니다. 공실·절전 효과이거나 데이터 누락 가능성을 확인하세요.`);
  } else if (a.field === 'other' && a.z > 0) {
    if (a.value > a.mean * 3) lines.push(`🔧 기타항목이 평균의 ${(a.value/a.mean).toFixed(1)}배 — 대규모 수선공사, 장기수선충당금 일시 정산, 화재보험료 일시납 등 특별 항목 발생 가능성이 매우 높습니다. 청구서 세부 내역 필수 확인.`);
    else lines.push(`📋 기타항목 증가 — 공동설비 유지보수, 엘리베이터 수리, 수도·청소비 변동 등 비정기 비용 원인 가능.`);
  } else if (a.field === 'other' && a.z < 0) {
    lines.push(`📉 기타항목이 낮습니다. 공동비용 정산 지연이나 항목 누락 여부를 확인하세요.`);
  } else if (a.field === 'general') {
    lines.push(a.z > 0
      ? `🏢 일반관리비 증가 — 관리인력 인건비 인상, 청소·경비 용역비 증액, 관리사무소 운영비 증가 가능성.`
      : `🏢 일반관리비가 낮습니다. 용역계약 변경이나 관리 항목 조정 여부를 확인하세요.`);
  }
  return lines.join('\n\n');
}

function generateBranchQuestion(branchName, anomalies) {
  const branch = branches[branchName];
  const fLabel = { elec: '세대전기료', other: '기타항목', general: '일반관리비' };
  const sorted = [...anomalies].sort((a, b) => a.month.localeCompare(b.month));
  const items  = sorted.map(a => {
    const pct = ((Math.abs(a.value - a.mean) / a.mean) * 100).toFixed(0);
    const ym  = a.month.replace('-', '년 ') + '월';
    return `  ■ ${ym} ${fLabel[a.field]}: ${a.value.toLocaleString()}원\n     (월평균 ${Math.round(a.mean).toLocaleString()}원 대비 ${a.z > 0 ? '+' : '-'}${pct}% ${a.z > 0 ? '초과' : '미달'})`;
  }).join('\n\n');

  return `[${branchName}] 관리비 이상 항목 일괄 확인 요청

안녕하세요,

${branch.note} 관리비 청구 내역 중 월평균과 크게 차이가 나는 항목들이 있어 일괄 문의드립니다.

${items}

각 항목에 대해 아래 사항을 포함하여 안내해 주시면 감사하겠습니다.
  1. 해당 월 세부 항목별 금액 내역
  2. 평소 대비 증감이 발생한 구체적 사유
     (예: 공사비, 장기수선충당금 정산, 화재보험료 일시납, 검침 오류 등)
  3. 동일 사유가 향후에도 지속될 예정인지 여부

감사합니다.`;
}

      <input type="range" class="threshold-slider" min="1.0" max="2.5" step="0.1" value="${anomalyThreshold}"
        oninput="anomalyThreshold=parseFloat(this.value); renderMain();">
      <span class="threshold-value" id="thresholdVal">${sLabel}</span>
      <span class="sigma-help" id="sigmaHelp" onclick="toggleSigmaHelp()" title="클릭하여 자세히 보기">❓ 이게 뭔가요?</span>
    </div>
    <div id="sigmaExplain" style="display:none;background:#F0F9FF;border:1px solid #BAE6FD;border-radius:10px;padding:14px 18px;margin-bottom:12px;font-size:0.82rem;line-height:1.7;color:#0C4A6E">
      <strong>📐 감지 범위 쉽게 이해하기</strong><br><br>
      이 기능은 각 항목(전기료, 관리비 등)의 <strong>월별 평균</strong>을 계산한 뒤,<br>
      그 평균에서 <strong>얼마나 많이 벗어났는지</strong>를 기준으로 이상 여부를 판단합니다.<br><br>
      예를 들어 세대전기료 평균이 10만원인데 어느 달에 25만원이 나왔다면 → 이상치!<br><br>
      <strong>슬라이더 위치에 따라:</strong><br>
      ◀ 왼쪽(민감) — 작은 차이도 이상으로 감지, 항목이 많아짐<br>
      ▶ 오른쪽(엄격) — 확실히 튀는 것만 감지, 핵심 이상만 표시<br><br>
      <em>처음에는 기본값(1.5)을 쓰고, 너무 많거나 적으면 조절해보세요.</em>
    </div>
    <div id="anomalyList"></div>
  `;

  const listEl = document.getElementById('anomalyList');

  if (allAnomalies.length === 0) {
    listEl.innerHTML = `<div class="anomaly-empty"><div class="anomaly-empty-icon">✅</div><p>현재 감지 범위(${anomalyThreshold})에서는 이상 항목이 없습니다.<br>슬라이더를 왼쪽으로 이동하면 더 많은 항목이 감지됩니다.</p></div>`;
    return;
  }

  active.forEach(branchName => {
    const items  = byBranch[branchName];
    const branch = branches[branchName];
    const rows   = branch.data.map(processRow);
    const color  = branchColor[branchName];
    const fields = ['general', 'elec', 'other'];
    const fLabel = { general: '일반관리비', elec: '세대전기료', other: '기타항목' };

    // Stats per field
    const stats = {};
    fields.forEach(f => {
      const vals = rows.map(r => r[f]);
      const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
      const std  = Math.sqrt(vals.reduce((s, v) => s + (v - mean) ** 2, 0) / vals.length);
      stats[f] = { mean, std };
    });

    // Anomaly lookup
    const aLookup = {};
    items.forEach(a => {
      if (!aLookup[a.month]) aLookup[a.month] = {};
      aLookup[a.month][a.field] = a;
    });

    // Heatmap rows
    const hRows = rows.map(row => {
      const cells = fields.map(f => {
        const val = row[f];
        const { mean, std } = stats[f];
        const z   = std > 1000 ? (val - mean) / std : 0;
        const a   = aLookup[row.month]?.[f];
        const pct = mean > 0 ? ((val - mean) / mean * 100).toFixed(0) : 0;
        let cls = '', pctHtml = '', onclick = '';
        if (a) {
          cls     = z > 0 ? 'hm-high' : 'hm-low';
          pctHtml = `<span class="hm-pct">${z > 0 ? '+' : ''}${pct}%</span>`;
          onclick = `onclick="toggleDetail('${branchName}','${row.month}','${f}')"`;
        }
        return `<td class="hm-cell ${cls}" ${onclick}>${val.toLocaleString()}${pctHtml}</td>`;
      }).join('');
      return `<tr><td class="hm-month">${row.month}</td>${cells}</tr>`;
    }).join('');

    const safeId = branchName.replace(/[^a-zA-Z0-9]/g, '_');
    const groupEl = document.createElement('div');
    groupEl.className = 'anomaly-branch-group';
    groupEl.innerHTML = `
      <div class="anomaly-branch-header">
        <div class="anomaly-branch-dot" style="background:${color}"></div>
        <span class="anomaly-branch-name">${branchName}</span>
        <span class="anomaly-branch-note">${branch.note}</span>
        <span class="anomaly-branch-badge">⚠ ${items.length}건</span>
      </div>
      <div class="hm-table-wrap">
        <table class="hm-table">
          <thead><tr>
            <th class="hm-th-month">월</th>
            <th>일반관리비</th><th>세대전기료</th><th>기타항목</th>
          </tr></thead>
          <tbody>${hRows}</tbody>
        </table>
      </div>
      <div class="branch-question-area">
        <button class="branch-copy-btn" id="bcb_${safeId}"
          onclick="copyBranchQuestion('${safeId}','${branchName}')">
          💬 ${branchName} — 이상 항목 전체 문의 문구 복사
        </button>
        <textarea class="branch-question-hidden" id="bq_${safeId}">${generateBranchQuestion(branchName, items)}</textarea>
      </div>
      <div class="anomaly-detail-area" id="detail_${safeId}"></div>
    `;
    listEl.appendChild(groupEl);
  });
}

function toggleSigmaHelp() {
  const el = document.getElementById('sigmaExplain');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function toggleDetail(branchName, month, field) {
  const safeId = branchName.replace(/[^a-zA-Z0-9]/g, '_');
  const key    = `${month}_${field}`;
  const area   = document.getElementById(`detail_${safeId}`);
  if (!area) return;

  if (openDetailKey[safeId] === key) {
    area.innerHTML = '';
    openDetailKey[safeId] = null;
    return;
  }
  openDetailKey[safeId] = key;

  const branch  = branches[branchName];
  const rows    = branch.data.map(processRow);
  const vals    = rows.map(r => r[field]);
  const mean    = vals.reduce((a, b) => a + b, 0) / vals.length;
  const std     = Math.sqrt(vals.reduce((s, v) => s + (v - mean) ** 2, 0) / vals.length);
  const val     = rows.find(r => r.month === month)[field];
  const z       = std > 0 ? (val - mean) / std : 0;
  const isHigh  = z > 0;
  const fLabel  = { elec: '세대전기료', other: '기타항목', general: '일반관리비' }[field];
  const color   = branchColor[branchName];
  const pct     = ((Math.abs(val - mean) / mean) * 100).toFixed(0);
  const a       = { branch: branchName, note: branch.note, month, field, value: val, mean, std, z, rows };
  const analysis = generateAnalysis(a);
  const cid     = `dc_${safeId}_${month}_${field}`.replace(/[^a-zA-Z0-9_]/g, '_');

  // Build 기타항목 breakdown section if available
  let breakdownHtml = '';
  if (field === 'other' && otherBreakdown[branchName]?.[month]) {
    const bd = otherBreakdown[branchName][month];
    const allMonthsBd = otherBreakdown[branchName];
    // Compute per-item averages for comparison
    const allItems = new Set(Object.values(allMonthsBd).flatMap(Object.keys));
    const itemAvg = {};
    allItems.forEach(item => {
      const vs = Object.values(allMonthsBd).map(m => m[item] || 0).filter(v => v > 0);
      itemAvg[item] = vs.length ? vs.reduce((a, b) => a + b, 0) / vs.length : 0;
    });
    const rows2 = Object.entries(bd).sort((a, b) => b[1] - a[1]);
    const bdRows = rows2.map(([item, v]) => {
      const avg = itemAvg[item] || 0;
      const diff = avg > 0 ? ((v - avg) / avg * 100).toFixed(0) : null;
      const flag = diff !== null && Math.abs(diff) >= 20 ? (diff > 0 ? `<span style="color:#DC2626;font-size:0.75rem"> +${diff}%↑</span>` : `<span style="color:#1D4ED8;font-size:0.75rem"> ${diff}%↓</span>`) : '';
      return `<tr><td style="padding:2px 8px 2px 0;color:#4B5563">${item}</td><td style="padding:2px 0;text-align:right;font-weight:600">${v.toLocaleString()}원</td><td>${flag}</td></tr>`;
    }).join('');
    breakdownHtml = `<div style="margin-top:10px;border-top:1px dashed #E5E7EB;padding-top:8px">
      <div style="font-size:0.72rem;color:#8B95A1;margin-bottom:4px">📋 기타항목 세부 내역</div>
      <table style="font-size:0.78rem;width:100%">${bdRows}</table>
    </div>`;
  } else if (field === 'other' && !otherBreakdown[branchName]) {
    breakdownHtml = `<div style="margin-top:8px;font-size:0.72rem;color:#8B95A1">📋 이 지점의 세부 내역 데이터가 없습니다.</div>`;
  }

  area.innerHTML = `
    <div class="detail-header">
      <span class="anomaly-badge ${isHigh ? 'high' : 'low'}">${isHigh ? '▲ 이상 높음' : '▼ 이상 낮음'}</span>
      <span class="anomaly-month">${month} · ${fLabel}</span>
      <span style="margin-left:auto;font-weight:700;color:${isHigh ? '#DC2626' : '#1D4ED8'}">${val.toLocaleString()}원</span>
      <span class="anomaly-vs">vs 평균 ${Math.round(mean).toLocaleString()}원 (${isHigh ? '+' : '-'}${pct}%)</span>
    </div>
    <div class="detail-body">
      <div class="detail-chart-wrap"><canvas id="${cid}"></canvas></div>
      <div class="analysis-box" style="flex:1;margin:0">
        <div class="analysis-box-label">🤖 원인 분석</div>
        <div class="analysis-text">${analysis}</div>
        ${breakdownHtml}
      </div>
    </div>
  `;

  setTimeout(() => {
    const canvas = document.getElementById(cid);
    if (!canvas) return;
    const labels    = rows.map(r => r.month.slice(5));
    const data      = rows.map(r => r[field]);
    const hi        = rows.findIndex(r => r.month === month);
    const ptColors  = data.map((_, i) => i === hi ? (isHigh ? '#DC2626' : '#1D4ED8') : color + '90');
    const ptRadii   = data.map((_, i) => i === hi ? 6 : 3);
    charts.push(new Chart(canvas, {
      type: 'line',
      data: { labels, datasets: [{ data, borderColor: color, backgroundColor: 'transparent',
        pointBackgroundColor: ptColors, pointRadius: ptRadii, tension: 0.3, borderWidth: 2, spanGaps: true }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.raw?.toLocaleString() + '원' } } },
        scales: {
          x: { grid: { display: false }, border: { display: false }, ticks: { font: { size: 9 } } },
          y: { grid: { color: '#F2F4F6' }, border: { display: false }, ticks: { callback: v => (v/10000).toFixed(0)+'만', font: { size: 9 } } }
        }
      }
    }));
  }, 0);
}

function copyBranchQuestion(safeId, branchName) {
  const text = document.getElementById('bq_' + safeId)?.value || '';
  const btn  = document.getElementById('bcb_' + safeId);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 복사됨!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = `💬 ${branchName} — 이상 항목 전체 문의 문구 복사`;
      btn.classList.remove('copied');
    }, 2500);
  });
}

function renderMain() {
  destroyCharts();
  const content = document.getElementById('mainContent');
  content.innerHTML = '';

  if (currentMode === 'single') {
    renderSingle(content);
  } else if (currentMode === 'item') {
    renderItem(content);
  } else {
    renderAnalyze(content);
  }
}

  // Table
  const table = document.getElementById('item_table');
  const thCells = selBranches.map(n => `<th style="color:${branchDarkColor[n]};font-weight:700">${n}</th>`).join('');
  const cumSums = {};
  selBranches.forEach(n => { cumSums[n] = 0; });

  const tRows = allMonths.map(m => {
    selBranches.forEach(n => { if (rowMaps[n][m]) cumSums[n] += rowMaps[n][m][item] || 0; });
    return `<tr><td>${m}</td>${selBranches.map(n => {
      const r = rowMaps[n][m];
      return `<td class="num" style="color:${branchDarkColor[n]}">${r ? (r[item]||0).toLocaleString() : '-'}</td>`;
    }).join('')}</tr>`;
  }).join('');

  const tfCells = selBranches.map(n =>
    `<td class="num" style="color:${branchDarkColor[n]};font-weight:700">${cumSums[n].toLocaleString()}</td>`
  ).join('');

  table.innerHTML = `
    <thead><tr><th>월</th>${thCells}</tr></thead>
    <tbody>${tRows}</tbody>
    <tfoot><tr><td>합계</td>${tfCells}</tr></tfoot>
  `;
}

// ============================
//  INIT
// ============================
buildBranchPanel();
renderMain();
</script>
</body>
</html>
